<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>調查表列印 ─ 教務組</title>
<style>
/* ── SCREEN STYLES (設定介面) ── */
:root {
  --navy:#0f2044; --navy2:#1a3060; --blue:#2d5be3; --blue-light:#e8eefb;
  --green:#16a34a; --green-light:#dcfce7;
  --bg:#f4f6fb; --surface:#fff; --border:#dde3f0;
  --text:#111827; --text2:#4b5563; --text3:#9ca3af;
  --radius:10px; --shadow:0 1px 4px rgba(15,32,68,.08),0 4px 16px rgba(15,32,68,.06);
}
@media screen {
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Microsoft JhengHei','PingFang TC',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px;}

  .header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(15,32,68,.25);}
  .header-title{font-size:1.1rem;font-weight:700;}
  .header-sub{font-size:.72rem;opacity:.6;margin-top:1px;}
  .hlink{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;padding:5px 12px;font-size:.78rem;text-decoration:none;}

  .main{max-width:960px;margin:0 auto;padding:24px 20px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:18px;box-shadow:var(--shadow);}
  .card-title{font-size:.95rem;font-weight:700;color:var(--navy);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}

  .form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:14px;}
  .form-group{display:flex;flex-direction:column;gap:5px;}
  label.lbl{font-size:.75rem;font-weight:700;color:var(--text2);letter-spacing:.04em;}
  input[type=text],input[type=number],select{border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:.875rem;color:var(--text);background:#fff;outline:none;font-family:inherit;transition:border-color .2s;}
  input:focus,select:focus{border-color:var(--blue);}

  .btn-group{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;}
  .btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:.875rem;font-weight:700;font-family:inherit;transition:all .18s;display:inline-flex;align-items:center;gap:7px;}
  .btn-print{background:var(--navy);color:#fff;}
  .btn-print:hover{background:var(--navy2);box-shadow:0 2px 8px rgba(15,32,68,.3);}
  .btn-green{background:var(--green);color:#fff;}
  .btn-green:hover{background:#15803d;}
  .btn-blue{background:var(--blue);color:#fff;}
  .btn-blue:hover{background:#2347c5;}

  .notice{background:var(--blue-light);border:1px solid #c7d4f7;border-radius:8px;padding:10px 14px;font-size:.82rem;color:#1e40af;line-height:1.6;margin-bottom:14px;}
  .class-check-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin-top:8px;}
  .class-chk{display:flex;align-items:center;gap:5px;font-size:.875rem;cursor:pointer;}
  .class-chk input{accent-color:var(--blue);width:15px;height:15px;cursor:pointer;}

  /* preview wrapper - screen only */
  #previewArea{margin-top:4px;}
  .preview-label{font-size:.82rem;color:var(--text3);margin-bottom:8px;}
}

/* ── PRINT STYLES ── */
@media print {
  body{margin:0;padding:0;background:#fff;font-family:'Microsoft JhengHei','PingFang TC','DFKai-SB',sans-serif;}
  .no-print{display:none !important;}
  .print-page{display:block !important;}
}

/* ── PRINT PAGE (共用) ── */
.print-page {
  display: none;
  width: 210mm;
  min-height: 297mm;
  padding: 5mm 5mm 5mm 5mm;
  box-sizing: border-box;
  background: #fff;
  font-family: 'Microsoft JhengHei','PingFang TC','DFKai-SB',sans-serif;
  font-size: 11pt;
  color: #000;
  page-break-after: always;
}
.print-page:last-of-type { page-break-after: avoid; }
@page { margin: 5mm; }

@media screen {
  .print-page {
    display: block;
    width: 100%;
    max-width: 720px;
    margin: 0 auto 24px auto;
    padding: 24px 28px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    background: #fff;
    font-size: 11pt;
    color: #000;
  }
}

/* ── FORM CONTENT STYLES ── */
.form-title {
  text-align: center;
  font-size: 14pt;
  font-weight: bold;
  margin-bottom: 6pt;
  line-height: 1.5;
}
.form-subtitle {
  text-align: center;
  font-size: 11pt;
  margin-bottom: 10pt;
  color: #333;
  line-height: 1.5;
}
.form-notice {
  font-size: 9.5pt;
  color: #222;
  margin-bottom: 10pt;
  line-height: 1.7;
  border: 1px solid #999;
  padding: 6pt 8pt;
  border-radius: 3pt;
  background: #f9f9f9;
}
.form-notice b { color: #000; }
.form-section-title {
  font-size: 12pt;
  font-weight: bold;
  background: #1a1a1a;
  color: #fff;
  padding: 4pt 8pt;
  margin-bottom: 0;
}
.form-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 10pt;
  font-size: 10.5pt;
}
.form-table th {
  background: #e8e8e8;
  border: 1pt solid #555;
  padding: 5pt 6pt;
  text-align: center;
  font-weight: bold;
  font-size: 10pt;
}
.form-table td {
  border: 1pt solid #555;
  padding: 5pt 6pt;
  vertical-align: middle;
  min-height: 20pt;
}
.form-table td.num { text-align: center; width: 28pt; font-weight: bold; }
.form-table td.name { width: 80pt; }
.form-table td.cls { width: 55pt; text-align: center; }
.form-table td.note { }
.form-table td.tall { height: 30pt; }
.form-table td.pair { width: 160pt; }
.form-footer {
  font-size: 9pt;
  color: #444;
  margin-top: 8pt;
  line-height: 1.8;
  border-top: 1pt solid #bbb;
  padding-top: 6pt;
}
.form-sign-row {
  display: flex;
  justify-content: flex-end;
  gap: 24pt;
  margin-top: 12pt;
  font-size: 10pt;
}
.form-sign-item {
  display: flex;
  align-items: center;
  gap: 4pt;
}
.sign-line {
  display: inline-block;
  border-bottom: 1pt solid #000;
  width: 60pt;
  height: 16pt;
  vertical-align: bottom;
}

/* ── TWIN SURVEY TABLE ── */
.twin-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 8pt;
  font-size: 10pt;
}
.twin-table th, .twin-table td {
  border: 1pt solid #555;
  padding: 5pt 4pt;
  text-align: center;
}
.twin-table th { background: #e8e8e8; font-weight: bold; }
.twin-table td { height: 22pt; }
.twin-table td.row-header { text-align: left; padding-left: 6pt; font-weight: bold; background: #f5f5f5; white-space: nowrap; }

/* ── TWIN APPLICATION ── */
.twin-app-title { font-size: 13pt; font-weight: bold; text-align: center; margin-bottom: 8pt; text-decoration: underline; }
.app-field { margin-bottom: 8pt; font-size: 10.5pt; line-height: 2; }
.app-line { display: inline-block; border-bottom: 1pt solid #000; min-width: 100pt; height: 14pt; vertical-align: bottom; }
.app-check { margin: 5pt 0; font-size: 10.5pt; line-height: 1.8; }
.app-sign { margin-top: 14pt; font-size: 10pt; }
.app-sign-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8pt; margin-top: 8pt; }
.app-sign-item { border: 1pt solid #aaa; padding: 8pt; min-height: 40pt; text-align: center; font-size: 10pt; }
</style>
</head>
<body>

<!-- ==================== SCREEN UI ==================== -->
<div class="no-print">
<div class="header">
  <div>
    <div class="header-title">🖨️ 調查表列印</div>
    <div class="header-sub">編班調查表設定與列印</div>
  </div>
  <div style="display:flex;gap:8px;">
    <a href="admin.html" class="hlink">← 後台</a>
    <a href="index.html" class="hlink">前台</a>
  </div>
</div>

<div class="main">

<!-- 設定區 -->
<div class="card">
  <div class="card-title">⚙️ 基本設定</div>
  <div class="form-grid">
    <div class="form-group">
      <label class="lbl">學年度</label>
      <input type="text" id="cfgYear" value="114" style="width:100%;">
    </div>
    <div class="form-group">
      <label class="lbl">繳回日期（導師表）</label>
      <input type="text" id="cfgDeadline1" value="4/18(五)中午前" style="width:100%;">
    </div>
    <div class="form-group">
      <label class="lbl">繳回日期（科任表）</label>
      <input type="text" id="cfgDeadline2" value="4/18(五)中午前" style="width:100%;">
    </div>
    <div class="form-group">
      <label class="lbl">繳回日期（雙胞胎調查）</label>
      <input type="text" id="cfgDeadlineTwin" value="3/26(三)中午前" style="width:100%;">
    </div>
    <div class="form-group">
      <label class="lbl">繳交地點</label>
      <input type="text" id="cfgPlace" value="教務處註冊組(112)" style="width:100%;">
    </div>
    <div class="form-group">
      <label class="lbl">學校全名</label>
      <input type="text" id="cfgSchool" value="高雄市左營區新莊國民小學" style="width:100%;">
    </div>
  </div>
  <div class="form-grid">
    <div class="form-group">
      <label class="lbl">2年級班數</label>
      <input type="number" id="cfg2Count" value="6" min="1" max="12" style="width:100px;">
    </div>
    <div class="form-group">
      <label class="lbl">4年級班數</label>

  </div>
  <div class="notice">修改上方設定後，直接點下方列印按鈕，表格內容會自動更新。</div>
</div>

<!-- 列印按鈕 -->
<div class="card">
  <div class="card-title">🖨️ 二升三　導師調查表</div>
  <div style="font-size:.8rem;color:var(--text2);margin-bottom:8px;">勾選要列印的班級（預設全部），再按列印按鈕：</div>
  <div class="class-check-grid" id="checks2"></div>
  <div style="display:flex;gap:8px;margin-top:6px;margin-bottom:14px;">
    <button class="btn btn-ghost btn-sm" onclick="checkAll(2,true)">全選</button>
    <button class="btn btn-ghost btn-sm" onclick="checkAll(2,false)">全消</button>
  </div>
  <button class="btn btn-print" onclick="printForm('grade2')">🖨️ 列印勾選班級</button>
</div>

<div class="card">
  <div class="card-title">🖨️ 四升五　導師調查表</div>
  <div style="font-size:.8rem;color:var(--text2);margin-bottom:8px;">勾選要列印的班級（預設全部），再按列印按鈕：</div>
  <div class="class-check-grid" id="checks4"></div>
  <div style="display:flex;gap:8px;margin-top:6px;margin-bottom:14px;">
    <button class="btn btn-ghost btn-sm" onclick="checkAll(4,true)">全選</button>
    <button class="btn btn-ghost btn-sm" onclick="checkAll(4,false)">全消</button>
  </div>
  <button class="btn btn-print" onclick="printForm('grade4')">🖨️ 列印勾選班級</button>
</div>

<div class="card">
  <div class="card-title">🖨️ 其他調查表</div>
  <div class="btn-group">
    <button class="btn btn-print" onclick="printForm('subject')">🖨️ 科任教師調查表</button>
    <button class="btn btn-print" onclick="printForm('twin2')">🖨️ 二年級 雙胞胎調查表</button>
    <button class="btn btn-print" onclick="printForm('twin4')">🖨️ 四年級 雙胞胎調查表</button>
  </div>
  <div style="margin-top:10px;" class="notice" style="font-size:.82rem;">雙胞胎申請書（較少使用，需要時再列印）：</div>
  <div class="btn-group" style="margin-top:8px;">
    <button class="btn btn-ghost" onclick="printForm('twinapp')">🖨️ 複數子女編班意願書</button>
    <button class="btn btn-ghost" onclick="printForm('twinadj')">🖨️ 複數子女改調班申請書</button>
  </div>
  <div style="margin-top:12px;font-size:.82rem;color:var(--text3);">
    列印時請在瀏覽器設定：A4、直向、縮放「無」或「符合頁面」。
  </div>
</div>

<!-- 預覽區 -->
<div class="card" id="previewCard" style="display:none;">
  <div class="card-title">👁 預覽</div>
  <div class="preview-label">以下為預覽，實際列印會依設定生成正確份數。</div>
  <div id="previewArea"></div>
</div>

</div><!-- end main -->
</div><!-- end no-print -->

<!-- ==================== PRINT AREA ==================== -->
<div id="printArea"></div>

<script>
// ── HELPERS ──
function v(id){ return document.getElementById(id).value.trim(); }
function classLabel(g,c){ return `${g}年${c}班`; }

function getConfig() {
  return {
    year: v('cfgYear'),
    deadline1: v('cfgDeadline1'),
    deadline2: v('cfgDeadline2'),
    deadlineTwin: v('cfgDeadlineTwin'),
    place: v('cfgPlace'),
    school: v('cfgSchool'),
    count2: parseInt(v('cfg2Count')) || 6,
    count4: parseInt(v('cfg4Count')) || 9,
  };
}

// ── CLASS CHECKBOXES ──
function initClassChecks() {
  const cfg = getConfig();
  buildChecks(2, cfg.count2);
  buildChecks(4, cfg.count4);
}

function buildChecks(grade, count) {
  const cont = document.getElementById(`checks${grade}`);
  if(!cont) return;
  const existing = [...cont.querySelectorAll('input[type=checkbox]')].map(c=>c.value);
  cont.innerHTML = '';
  for(let i=1; i<=count; i++) {
    const id = `chk${grade}_${i}`;
    const lbl = document.createElement('label');
    lbl.className = 'class-chk';
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.id = id; cb.value = i;
    cb.checked = true; // default all checked
    const span = document.createElement('span');
    span.textContent = `${grade}年${i}班`;
    lbl.appendChild(cb); lbl.appendChild(span);
    cont.appendChild(lbl);
  }
}

function checkAll(grade, val) {
  document.querySelectorAll(`#checks${grade} input[type=checkbox]`).forEach(c=>c.checked=val);
}

function getCheckedClasses(grade) {
  return [...document.querySelectorAll(`#checks${grade} input[type=checkbox]:checked`)].map(c=>parseInt(c.value));
}

// Re-init checkboxes when count changes
document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('cfg2Count').addEventListener('change', ()=>buildChecks(2, parseInt(v('cfg2Count'))||6));
  document.getElementById('cfg4Count').addEventListener('change', ()=>buildChecks(4, parseInt(v('cfg4Count'))||9));
  initClassChecks();
});

// ── FORM GENERATORS ──

function buildTeacherForm(grade, classNum, cfg) {
  const gradeLabel = grade === 2 ? '三' : '五';
  const srcLabel   = grade === 2 ? '二' : '四';
  // Format class label as pure number e.g. "201", "401"
  const clsNum = String(grade) + '0' + String(classNum);
  const div = document.createElement('div');
  div.className = 'print-page';
  div.innerHTML = `
<div style="display:flex;justify-content:space-between;align-items:baseline;border-bottom:2pt solid #000;padding-bottom:4pt;margin-bottom:8pt;">
  <div style="font-size:13pt;font-weight:bold;">${cfg.year} 學年度　升${gradeLabel}年級　編班學生調查表</div>
  <div style="font-size:10pt;color:#444;">班級：<b style="font-size:13pt;color:#000;">${clsNum}</b></div>
</div>

<div style="font-size:8.5pt;border:0.5pt solid #aaa;padding:5pt 7pt;margin-bottom:8pt;line-height:1.7;background:#f7f7f7;">
  請老師填寫班上<b>需多費心</b>及<b>不宜再同班</b>的學生名單，作為 ${cfg.year} 學年度編班參考。<br>
  如班上無此類學生可不填，仍請放入信封密封後，於 <b>${cfg.deadline1}</b> 前交回 ${cfg.place}。感謝！<br>
  ※ 以上學生<b>不包含</b>資源班、資優班學生（資源班、資優班學生編班時會自動分散各班）。
</div>

<div style="font-size:10.5pt;font-weight:bold;background:#222;color:#fff;padding:3.5pt 7pt;margin-bottom:0;">
  壹、需多費心學生名單　<span style="font-size:9pt;font-weight:normal;">（請填 1–3 名，含座號）</span>
</div>
<table style="width:100%;border-collapse:collapse;font-size:10pt;margin-bottom:8pt;">
  <colgroup>
    <col style="width:22pt;">
    <col style="width:30pt;">
    <col style="width:62pt;">
    <col>
  </colgroup>
  <tr style="background:#eee;">
    <th style="border:0.75pt solid #555;padding:4pt 3pt;text-align:center;">編號</th>
    <th style="border:0.75pt solid #555;padding:4pt 3pt;text-align:center;">座號</th>
    <th style="border:0.75pt solid #555;padding:4pt 3pt;text-align:center;">學生姓名</th>
    <th style="border:0.75pt solid #555;padding:4pt 6pt;text-align:left;">說　明（行為特徵、需注意事項等）</th>
  </tr>
  ${[1,2,3,4,5].map(n=>`
  <tr>
    <td style="border:0.75pt solid #555;padding:3pt;text-align:center;font-weight:bold;">${n}</td>
    <td style="border:0.75pt solid #555;padding:3pt;height:22pt;"></td>
    <td style="border:0.75pt solid #555;padding:3pt;"></td>
    <td style="border:0.75pt solid #555;padding:3pt;"></td>
  </tr>`).join('')}
</table>

<div style="font-size:10.5pt;font-weight:bold;background:#222;color:#fff;padding:3.5pt 7pt;margin-bottom:0;">
  貳、不宜再同班的學生名單　<span style="font-size:9pt;font-weight:normal;">（甲生跨列合併，每位乙生各填一行；超過 3 位請寫說明欄或紙張背面）</span>
</div>
<table style="width:100%;border-collapse:collapse;font-size:10pt;margin-bottom:6pt;">
  <colgroup>
    <col style="width:18pt;">
    <col style="width:28pt;">
    <col style="width:58pt;">
    <col style="width:18pt;">
    <col style="width:28pt;">
    <col style="width:58pt;">
    <col>
  </colgroup>
  <tr style="background:#eee;">
    <th style="border:0.75pt solid #555;padding:4pt 3pt;text-align:center;">組</th>
    <th colspan="2" style="border:0.75pt solid #555;padding:4pt 3pt;text-align:center;">學生甲<br><span style="font-size:8pt;font-weight:normal;">（座號／姓名）</span></th>
    <th colspan="3" style="border:0.75pt solid #555;padding:4pt 3pt;text-align:center;">不宜與甲同班之學生乙<br><span style="font-size:8pt;font-weight:normal;">（每行一位，座號／姓名）</span></th>
    <th style="border:0.75pt solid #555;padding:4pt 5pt;text-align:left;">說明（原因、衝突背景等）</th>
  </tr>
  ${[1,2,3,4].map(n => {
    const B = 'border:0.75pt solid #555;';
    const rowH = 'height:20pt;';
    // 5 乙生 rows per group; first row has rowspan cells for 組、甲座號、甲姓名、說明
    const rows = [1,2,3].map((bi, idx) => {
      const isFirst = idx === 0;
      const rs = 'rowspan="3"';
      return `<tr>
        ${isFirst ? `<td ${rs} style="${B}padding:3pt;text-align:center;font-weight:bold;vertical-align:middle;background:#f5f5f5;">${n}</td>
        <td ${rs} style="${B}padding:3pt;vertical-align:middle;${rowH}"></td>
        <td ${rs} style="${B}padding:3pt;vertical-align:middle;"></td>` : ''}
        <td style="${B}padding:3pt;text-align:center;font-size:8.5pt;color:#888;vertical-align:middle;">${bi}</td>
        <td style="${B}padding:3pt;vertical-align:middle;${rowH}"></td>
        <td style="${B}padding:3pt;vertical-align:middle;"></td>
        ${isFirst ? `<td ${rs} style="${B}padding:3pt;vertical-align:top;"></td>` : ''}
      </tr>`;
    }).join('');
    return rows;
  }).join('')}
</table>

<div style="font-size:8.5pt;color:#555;margin-bottom:8pt;line-height:1.6;">
  ※ 如超過 3 位乙生，請在說明欄補充說明，或另寫於紙張背面。<br>
  ※ 此表填寫資料僅供編班參考，請放入信封密封後交回。

// ── MAIN PRINT FUNCTION ──
function printForm(type) {
  const cfg = getConfig();
  const printArea = document.getElementById('printArea');
  const previewArea = document.getElementById('previewArea');
  printArea.innerHTML = '';
  previewArea.innerHTML = '';

  const pages = [];

  if(type === 'grade2') {
    const sel = getCheckedClasses(2);
    if(!sel.length){ alert('請至少勾選一個班級'); return; }
    sel.forEach(i => pages.push(buildTeacherForm(2, i, cfg)));
  } else if(type === 'grade4') {
    const sel = getCheckedClasses(4);
    if(!sel.length){ alert('請至少勾選一個班級'); return; }
    sel.forEach(i => pages.push(buildTeacherForm(4, i, cfg)));
  } else if(type === 'subject') {
    pages.push(buildSubjectForm(cfg));
  } else if(type === 'twin2') {
    pages.push(buildTwinSurveyGrade(2, cfg));
  } else if(type === 'twin4') {
    pages.push(buildTwinSurveyGrade(4, cfg));
  } else if(type === 'twinapp') {
    pages.push(buildTwinApp(cfg));
  } else if(type === 'twinadj') {
    pages.push(buildTwinAdj(cfg));
  }

  pages.forEach(p => {
    printArea.appendChild(p.cloneNode(true));
    previewArea.appendChild(p);
  });

  document.getElementById('previewCard').style.display = '';

  // Trigger print after short delay for render
  setTimeout(()=>{ window.print(); }, 300);
}
</script>
