<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>核章列印 ─ 教務處註冊組</title>
<style>
:root{--navy:#0f2044;--navy2:#1a3060;--blue:#2d5be3;--blue-light:#e8eefb;--red:#dc2626;--bg:#f4f6fb;--surface:#fff;--border:#dde3f0;--text:#111827;--text2:#4b5563;--text3:#9ca3af;--radius:10px;--shadow:0 1px 4px rgba(15,32,68,.08),0 4px 16px rgba(15,32,68,.06);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Microsoft JhengHei','PingFang TC',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px;}
@media screen{
  .header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(15,32,68,.25);}
  .header-title{font-size:1rem;font-weight:700;}
  .header-sub{font-size:.7rem;opacity:.6;margin-top:1px;}
  .hbtn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;padding:4px 10px;font-size:.75rem;text-decoration:none;display:inline-block;}
  .main{max-width:860px;margin:0 auto;padding:20px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px;box-shadow:var(--shadow);}
  .card-title{font-size:.9rem;font-weight:700;color:var(--navy);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  .form-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px;}
  .form-group{display:flex;flex-direction:column;gap:4px;}
  label.lbl{font-size:.73rem;font-weight:700;color:var(--text2);letter-spacing:.04em;}
  input[type=text]{border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-size:.875rem;color:var(--text);background:#fff;outline:none;font-family:inherit;}
  input:focus{border-color:var(--blue);}
  .btn{padding:9px 16px;border-radius:8px;border:none;cursor:pointer;font-size:.875rem;font-weight:600;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:all .15s;}
  .btn-primary{background:var(--blue);color:#fff;}.btn-primary:hover{background:#2347c5;}
  .btn-red{background:var(--red);color:#fff;}.btn-red:hover{background:#b91c1c;}
  .btn-group{display:flex;flex-direction:column;gap:6px;margin-bottom:6px;}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;}
  .group-label{font-size:.78rem;font-weight:700;color:var(--text2);margin-bottom:4px;}
  .notice{background:var(--blue-light);border:1px solid #c7d4f7;border-radius:8px;padding:8px 12px;font-size:.8rem;color:#1e40af;line-height:1.6;margin-bottom:12px;}
  .preview-wrap{border:2px dashed var(--border);border-radius:var(--radius);padding:12px;margin-top:12px;background:var(--bg);}
  .preview-label{font-size:.78rem;color:var(--text3);margin-bottom:8px;}
  .no-print{display:block;}.print-only{display:none!important;}
}
@media print{
  body{background:#fff;}
  .no-print{display:none!important;}
  .print-only{display:block!important;}
  .print-page{page-break-after:always;}
  .print-page:last-child{page-break-after:avoid;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
}
@page{margin:5mm;}

/* ── 列印樣式 ── */
.print-page{background:#fff;font-family:'Microsoft JhengHei','PingFang TC','DFKai-SB',sans-serif;font-size:10pt;color:#000;padding:0;}
.doc-header{text-align:center;margin-bottom:8pt;}
.doc-annex{font-size:9.5pt;color:#333;}
.doc-school{font-size:11pt;}
.doc-title{font-size:14pt;font-weight:bold;margin:4pt 0 2pt;}
.doc-grade{font-size:10.5pt;margin-bottom:4pt;}
.doc-note{font-size:9pt;color:#333;text-align:left;margin-bottom:8pt;line-height:1.6;}
.stamp-row{display:flex;justify-content:flex-end;gap:0;margin-top:16pt;border-top:1pt solid #bbb;padding-top:8pt;}
.stamp-cell{border:1pt solid #aaa;padding:6pt 8pt;min-width:80pt;min-height:52pt;text-align:center;font-size:9.5pt;}
.rpt-table{width:100%;border-collapse:collapse;font-size:9.5pt;margin-bottom:10pt;}
.rpt-table th{border:0.75pt solid #555;padding:4pt 6pt;text-align:center;background:#ddd;font-weight:bold;}
.rpt-table td{border:0.75pt solid #555;padding:4pt 6pt;vertical-align:top;background:#fff;}
.rpt-table tbody tr{background:#fff;break-inside:avoid;page-break-inside:avoid;}
.rpt-table td.c{text-align:center;vertical-align:middle;}
.cls-bar{background:#222;color:#fff;font-weight:bold;font-size:10pt;padding:3pt 8pt;border:0.75pt solid #333;}
.cls-bar-gray{background:#555;color:#fff;font-weight:bold;font-size:9pt;padding:2pt 6pt;border:0.75pt solid #444;}
</style>
</head>
<body>

<div class="no-print">
<div class="header">
  <div><div class="header-title">📄 核章列印</div><div class="header-sub">教務處註冊組</div></div>
  <div style="display:flex;gap:8px;">
    <a href="admin.html" class="hbtn">← 後台</a>
    <a href="print.html" class="hbtn">調查表</a>
  </div>
</div>
<div class="main">
  <div class="card">
    <div class="card-title">⚙️ 設定</div>
    <div class="form-row">
      <div class="form-group"><label class="lbl">學年度</label><input type="text" id="cfgYear" value="114" style="width:64px;"></div>
      <div class="form-group"><label class="lbl">學校名稱</label><input type="text" id="cfgSchool" value="高雄市新莊國民小學" style="width:200px;"></div>
      <div class="form-group"><label class="lbl">製表日期</label><input type="text" id="cfgDate" style="width:130px;"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🖨️ 選擇列印文件</div>
    <div class="notice">列印時請在瀏覽器勾選「背景圖形」，確保黑色標題列正確列印。</div>

    <div class="btn-group">
      <div class="group-label">📋 附件A：雙胞胎申請一覽表</div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="go('twin0')">🖨️ 新生雙胞胎（升1年級）</button>
        <button class="btn btn-primary" onclick="go('twin2')">🖨️ 2年級雙胞胎（升3年級）</button>
        <button class="btn btn-primary" onclick="go('twin4')">🖨️ 4年級雙胞胎（升5年級）</button>
      </div>
    </div>

    <hr style="border:none;border-top:1px solid var(--border);margin:12px 0;">

    <div class="btn-group">
      <div class="group-label">📋 附件B-1：需費心關懷學生一覽表</div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="go('bighead0')">🖨️ 新生需費心（升1年級）</button>
        <button class="btn btn-primary" onclick="go('bighead2')">🖨️ 2年級需費心（升3年級）</button>
        <button class="btn btn-primary" onclick="go('bighead4')">🖨️ 4年級需費心（升5年級）</button>
      </div>
    </div>

    <hr style="border:none;border-top:1px solid var(--border);margin:12px 0;">

    <div class="btn-group">
      <div class="group-label">📋 附件B-2：不宜再同班學生一覽表</div>
      <div class="btn-row">
        <button class="btn btn-red" onclick="go('rules0')">🖨️ 新生不宜同班（升1年級）</button>
        <button class="btn btn-red" onclick="go('rules2')">🖨️ 2年級不宜同班（升3年級）</button>
        <button class="btn btn-red" onclick="go('rules4')">🖨️ 4年級不宜同班（升5年級）</button>
      </div>
    </div>

    <hr style="border:none;border-top:1px solid var(--border);margin:12px 0;">

    <div class="btn-group">
      <div class="group-label">📋 附件C：資優生群組一覽表</div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="go('gifted0')" style="background:#b45309;">🖨️ 新生資優生群組（升1年級）</button>
        <button class="btn btn-primary" onclick="go('gifted2')" style="background:#b45309;">🖨️ 2年級資優生群組（升3年級）</button>
        <button class="btn btn-primary" onclick="go('gifted4')" style="background:#b45309;">🖨️ 4年級資優生群組（升5年級）</button>
      </div>
    </div>

    <hr style="border:none;border-top:1px solid var(--border);margin:12px 0;">

    <div class="btn-group">
      <div class="group-label">📋 附件D：鑑輔生群組一覽表</div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="go('special0')" style="background:#7c3aed;">🖨️ 新生鑑輔生群組（升1年級）</button>
        <button class="btn btn-primary" onclick="go('special2')" style="background:#7c3aed;">🖨️ 2年級鑑輔生群組（升3年級）</button>
        <button class="btn btn-primary" onclick="go('special4')" style="background:#7c3aed;">🖨️ 4年級鑑輔生群組（升5年級）</button>
      </div>
    </div>
  </div>

  <div class="card" id="previewCard" style="display:none;">
    <div class="card-title">👁 預覽</div>
    <div class="notice">以下為預覽，實際列印以瀏覽器輸出為準。</div>
    <div class="preview-wrap">
      <div class="preview-label">預覽區</div>
      <div id="previewArea"></div>
    </div>
  </div>
</div>
</div>

<div id="printArea"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyBLo5kR4_h0H9HY370ySQslTQCKvXR4SvE",
  authDomain:"sjps-classchange.firebaseapp.com",
  projectId:"sjps-classchange",
  storageBucket:"sjps-classchange.firebasestorage.app",
  messagingSenderId:"907928897295",
  appId:"1:907928897295:web:b6bfb2dcb3c8c447ad607a"
});
const db = firebase.firestore();
const state = {students:{},rules:{},twins:{},teachers:{},studentNotes:{}};

document.getElementById('cfgDate').value = new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'});

async function loadAll() {
  const [s,r,t,tc,ns] = await Promise.all([
    db.collection('students').get(),
    db.collection('separationRules').get(),
    db.collection('gradeTwins').get(),
    db.collection('teachers').get(),
    db.collection('studentNotes').get()
  ]);
  s.forEach(d=>{state.students[d.id]={id:d.id,...d.data()};});
  r.forEach(d=>{state.rules[d.id]={id:d.id,...d.data()};});
  t.forEach(d=>{state.twins[d.id]={id:d.id,...d.data()};});
  tc.forEach(d=>{state.teachers[d.id]={id:d.id,...d.data()};});
  state.studentNotes={};
  ns.forEach(d=>{
    const n={id:d.id,...d.data()};
    if(!state.studentNotes[n.studentId]) state.studentNotes[n.studentId]=[];
    state.studentNotes[n.studentId].push(n);
  });
}

function v(id){return document.getElementById(id).value.trim();}
function clsLabel(g,c){return `${g}年${c}班`;}
function getGiftedGroup(tags,grade){
  if(grade!==undefined){const t=(tags||[]).find(t=>t.startsWith(`gifted_g${grade}_`));if(t)return parseInt(t.split('_').pop());}
  const t=(tags||[]).find(t=>t.startsWith('gifted_g')&&!t.includes('_',8));return t?parseInt(t.replace('gifted_g','')):1;
}
function getSpecialGroup(tags,grade){
  if(grade!==undefined){const t=(tags||[]).find(t=>t.startsWith(`special_g${grade}_`));if(t)return parseInt(t.split('_').pop());}
  const t=(tags||[]).find(t=>t.startsWith('special_g')&&!t.includes('_',9));return t?parseInt(t.replace('special_g','')):1;
}
function teacher(grade,cls){
  const key=`${grade}-${cls}`;
  if(state.teachers[key]) return state.teachers[key].name;
  const t=Object.values(state.teachers).find(t=>t.grade===grade&&t.class===cls);
  return t?t.name:'';
}
function gradeLabel(g){return {0:'一',2:'三',4:'五'}[g]||g;}
function stampRow(){
  return `<table style="width:100%;border-collapse:collapse;margin-top:14pt;border-top:1pt solid #bbb;">
    <tr>
      <td style="border:1pt solid #aaa;padding:6pt 8pt 0 8pt;height:72pt;text-align:center;font-size:10pt;width:33.33%;vertical-align:top;">承辦人</td>
      <td style="border:1pt solid #aaa;padding:6pt 8pt 0 8pt;height:72pt;text-align:center;font-size:10pt;width:33.33%;vertical-align:top;">教務主任</td>
      <td style="border:1pt solid #aaa;padding:6pt 8pt 0 8pt;height:72pt;text-align:center;font-size:10pt;width:33.33%;vertical-align:top;">校　長</td>
    </tr>
  </table>`;
}

// ═══════════════════════════════════════
// 附件三：雙胞胎（依年級）
// ═══════════════════════════════════════
function buildTwin(grade) {
  const year=v('cfgYear'); const school=v('cfgSchool'); const date=v('cfgDate');
  const targetGrade = grade+1;
  const twins = Object.values(state.twins)
    .filter(t=>t.grade===grade)
    .sort((a,b)=>{
      const ma=(a.members||[{id:a.s1Id}])[0]; const mb=(b.members||[{id:b.s1Id}])[0];
      const sa=state.students[ma.id]; const sb=state.students[mb.id];
      if(!sa||!sb) return 0;
      return sa.class!==sb.class ? sa.class-sb.class : sa.number-sb.number;
    });

  const rows = twins.map((t,i)=>{
    const members = t.members||[{id:t.s1Id,name:t.s1Name},{id:t.s2Id,name:t.s2Name}];
    const pref    = t.preference==='same'?'同班':'不同班';
    const note    = t.note||'';
    const code    = t.twinCode || `T${i+1}${t.preference==='same'?'+':'-'}`;
    const cColor  = t.preference==='same'?'#0d9488':'#dc2626';
    const cBg     = t.preference==='same'?'#ccfbf1':'#fee2e2';
    const nameCells = members.map(m=>`<span style="white-space:nowrap;"><span style="font-family:monospace;font-weight:800;font-size:9pt;background:${cBg};color:${cColor};border:0.5pt solid ${cColor};border-radius:2pt;padding:0 3pt;">${code}</span> ${m.name}</span>`).join('　');
    return `<tr style="break-inside:avoid;page-break-inside:avoid;">
      <td class="c">${i+1}</td>
      <td class="c">${targetGrade}</td>
      <td>${nameCells}</td>
      <td class="c">雙胞胎</td>
      <td class="c">${pref}</td>
      <td>${note}</td>
    </tr>`;
  }).join('');

  const div=document.createElement('div'); div.className='print-page';
  div.innerHTML=`
<div class="doc-header">
  <div class="doc-annex">（附件A）　${school}</div>
  <div class="doc-title">${year} 學年度同年級複數子女學生編班申請一覽表</div>
  <div class="doc-grade">升${gradeLabel(grade)}年級</div>
  <div style="text-align:right;font-size:8.5pt;color:#555;">製表日期：${date}</div>
</div>
<table class="rpt-table">
  <thead>
    <tr>
      <th style="width:24pt;">編號</th>
      <th style="width:46pt;">${year}學年度<br>就讀年級</th>
      <th>學生姓名（含代號）</th>
      <th style="width:44pt;">申請原因</th>
      <th style="width:56pt;">希望同班<br>或不同班</th>
      <th>備　註</th>
    </tr>
  </thead>
  <tbody>
    ${rows||'<tr><td colspan="7" class="c" style="color:#aaa;padding:12pt;">尚無資料</td></tr>'}
  </tbody>
</table>
${stampRow()}`;
  return div;
}


// ═══════════════════════════════════════
// 附件四-A：需費心關懷學生（全年級一張表）
// ═══════════════════════════════════════
function buildBighead(grade) {
  const year=v('cfgYear'); const school=v('cfgSchool'); const date=v('cfgDate');
  const gl=gradeLabel(grade);
  const maxClass = grade===4?9:6; // 0,2年級6班；4年級9班

  // 收集全年級大頭，依班級→座號排序
  const rows = [];
  for(let cls=1;cls<=maxClass;cls++){
    const tName = teacher(grade,cls);
    const bigheads = Object.values(state.students)
      .filter(s=>s.grade===grade&&s.class===cls&&s.tags.includes('bighead'))
      .sort((a,b)=>a.number-b.number);
    bigheads.forEach(s=>{
      // 取得說明
      const notes = state.studentNotes ? (state.studentNotes[s.id]||[]) : [];
      const noteText = notes.map(n=>n.text).join('；');
      rows.push(`<tr style="break-inside:avoid;page-break-inside:avoid;">
        <td class="c" style="white-space:nowrap;">${grade}0${cls}${String(s.number).padStart(2,'0')}</td>
        <td style="white-space:nowrap;">${s.name}</td>
        <td class="c">${s.gender==='M'?'男':'女'}</td>
        <td class="c" style="white-space:nowrap;">${tName||''}</td>
        <td style="font-size:8.5pt;line-height:1.5;">${noteText}</td>
      </tr>`);
    });
  }

  const div=document.createElement('div'); div.className='print-page';
  div.innerHTML=`
<div style="margin-bottom:6pt;">
  <div style="font-size:13pt;font-weight:bold;text-align:center;">（附件B-1）「需費心關懷學生」編班申請一覽表 ─ 升${gl}年級</div>
  <div style="display:flex;justify-content:space-between;font-size:8.5pt;color:#333;margin-top:3pt;">
    <span>※ ${year}學年度 ${grade}升${gl}年級依導師與科任教師建議平均分散至各班</span>
    <span>製表日期：${date}</span>
  </div>
</div>
<table class="rpt-table">
  <thead>
    <tr>
      <th style="width:52pt;">班級座號</th>
      <th style="width:52pt;">學生姓名</th>
      <th style="width:24pt;">性別</th>
      <th style="width:52pt;">導師</th>
      <th>說明（行為特徵、需注意事項等）</th>
    </tr>
  </thead>
  <tbody>
    ${rows.length?rows.join(''):'<tr><td colspan="5" class="c" style="color:#aaa;padding:12pt;">本年級無需費心學生</td></tr>'}
  </tbody>
</table>
${stampRow()}`;
  return [div];
}

// ═══════════════════════════════════════
// 附件四-B：不宜再同班學生（全年級一張表）
// ═══════════════════════════════════════
function buildRules(grade) {
  const year=v('cfgYear'); const school=v('cfgSchool'); const date=v('cfgDate');
  const gl=gradeLabel(grade);
  const maxClass = grade===4?9:6; // 0,2年級6班；4年級9班

  // 全年級規則，依班級→目標學生座號排序
  const allRules = Object.values(state.rules)
    .filter(r=>r.grade===grade)
    .sort((a,b)=>{
      if(a.targetStudentClass!==b.targetStudentClass) return a.targetStudentClass-b.targetStudentClass;
      const sa=state.students[a.targetStudentId]; const sb=state.students[b.targetStudentId];
      return sa&&sb?sa.number-sb.number:0;
    });

  const rows = allRules.map(r=>{
    const stu   = state.students[r.targetStudentId];
    const cls   = r.targetStudentClass;
    const tName = teacher(grade,cls);
    const code  = r.groupCode||'';
    const stuCode = stu ? `${grade}0${cls}${String(stu.number).padStart(2,'0')}` : '';
    const typeLabel = r.type==='group'?'全拆開':'甲避乙';
    const isGrp = r.type==='group';
    const base  = (r.groupCode||'').replace(/[0-9+-]+$/,'');
    const memberSign = isGrp?'-':'+';
    const memberCode = base ? `${base}1${memberSign}` : '';
    const mc = isGrp?'#dc2626':'#16a34a';
    const sepList = [...(r.separateFrom||[])]
      .sort((a,b)=>{
        const sa=state.students[a.id]; const sb=state.students[b.id];
        return sa&&sb?sa.class-sb.class||sa.number-sb.number:0;
      })
      .map(s=>{
        const st=state.students[s.id];
        const sc=st?`${grade}0${st.class}${String(st.number).padStart(2,'0')}`:'';
        const codeSpan = memberCode?`<span style="font-family:monospace;font-weight:bold;font-size:8pt;color:${mc};border:0.5pt solid ${mc};border-radius:2pt;padding:0 2pt;">${memberCode}</span> `:'';
        return st?`<span style="white-space:nowrap;">${codeSpan}${sc} ${st.name}</span>`:s.name;
      }).join('<br>');
    const remarks = (r.remarks&&r.remarks.length)
      ? r.remarks.map(rm=>rm.text).join('；')
      : (r.reason||'');
    return `<tr style="break-inside:avoid;page-break-inside:avoid;">
      <td class="c" style="white-space:nowrap;font-size:9pt;vertical-align:middle;">${stuCode}<br><b>${stu?stu.name:r.targetStudentName}</b>${code?`<br><span style="font-family:monospace;font-weight:bold;color:#dc2626;">${code}</span>`:''}
      </td>
      <td class="c" style="white-space:nowrap;font-size:9pt;">${tName||''}</td>
      <td class="c" style="white-space:nowrap;font-size:9pt;">${typeLabel}</td>
      <td style="font-size:8.5pt;line-height:1.5;">${sepList}</td>
      <td style="font-size:8.5pt;line-height:1.5;">${remarks}</td>
    </tr>`;
  });

  const div=document.createElement('div'); div.className='print-page';
  div.innerHTML=`
<div style="margin-bottom:6pt;">
  <div style="font-size:13pt;font-weight:bold;text-align:center;">（附件B-2）「不宜再同班學生」編班申請一覽表 ─ 升${gl}年級</div>
  <div style="display:flex;justify-content:space-between;font-size:8.5pt;color:#333;margin-top:3pt;">
    <span>※ ${year}學年度 ${grade}升${gl}年級依導師與科任教師建議分散處理，如下表列</span>
    <span>製表日期：${date}</span>
  </div>
</div>
<table class="rpt-table">
  <thead>
    <tr>
      <th style="width:54pt;">班級座號<br>學生（甲）</th>
      <th style="width:44pt;">導師</th>
      <th style="width:36pt;">隔離<br>方式</th>
      <th style="width:120pt;">不宜同班對象（乙）</th>
      <th>說　明</th>
    </tr>
  </thead>
  <tbody>
    ${rows.length?rows.join(''):'<tr><td colspan="5" class="c" style="color:#aaa;padding:12pt;">本年級無不宜同班規則</td></tr>'}
  </tbody>
</table>
${stampRow()}`;
  return [div];
}


// ═══════════════════════════════════════
// 附件C：資優生群組一覽表
// ═══════════════════════════════════════
function buildGiftedGroup(grade) {
  const year=v('cfgYear'); const date=v('cfgDate');
  const gl=gradeLabel(grade);
  const grpMap = {};
  Object.values(state.students).filter(s=>s.grade===grade&&s.tags.includes('gifted')).forEach(s=>{
    const g = getGiftedGroup(s.tags, grade);
    if(!grpMap[g]) grpMap[g]=[];
    grpMap[g].push(s);
  });
  const grpNums = Object.keys(grpMap).map(Number).sort();
  const rows = grpNums.flatMap(g=>{
    const stus=[...grpMap[g]].sort((a,b)=>a.class-b.class||a.number-b.number);
    return stus.map((s,i)=>`<tr style="break-inside:avoid;page-break-inside:avoid;">
      ${i===0?`<td rowspan="${stus.length}" class="c" style="font-family:monospace;font-weight:800;font-size:11pt;background:#fef9c3;color:#b45309;vertical-align:middle;">G${g}</td>`:''}
      <td class="c">${grade}0${s.class}${String(s.number).padStart(2,'0')}</td>
      <td>${s.name}</td>
      <td class="c">${s.gender==='M'?'男':'女'}</td>
      <td class="c">${clsLabel(s.grade,s.class)}</td>
      <td class="c">${teacher(grade,s.class)||''}</td>
      <td></td>
    </tr>`);
  }).join('');
  const div=document.createElement('div'); div.className='print-page';
  div.innerHTML=`
<div style="margin-bottom:6pt;">
  <div style="font-size:13pt;font-weight:bold;text-align:center;">（附件C）「資優生」群組一覽表 ─ 升${gl}年級</div>
  <div style="display:flex;justify-content:space-between;font-size:8.5pt;color:#333;margin-top:3pt;">
    <span>※ ${year}學年度 ${grade}升${gl}年級資優生群組分配，同群組安排在同一班</span>
    <span>製表日期：${date}</span>
  </div>
</div>
<table class="rpt-table">
  <thead><tr>
    <th style="width:36pt;">群組</th>
    <th style="width:54pt;">班級座號</th>
    <th style="width:60pt;">姓名</th>
    <th style="width:28pt;">性別</th>
    <th style="width:54pt;">現班級</th>
    <th style="width:54pt;">導師</th>
    <th>備　註</th>
  </tr></thead>
  <tbody>${rows||'<tr><td colspan="7" class="c" style="color:#aaa;padding:12pt;">本年級無資優生資料</td></tr>'}</tbody>
</table>
${stampRow()}`;
  return [div];
}

// ═══════════════════════════════════════
// 主函數
// ═══════════════════════════════════════
async function go(type) {
  await loadAll();
  const printArea   = document.getElementById('printArea');
  const previewArea = document.getElementById('previewArea');
  printArea.innerHTML=''; previewArea.innerHTML='';

  let pages=[];
  if(type==='twin0')    pages=[buildTwin(0)];
  if(type==='twin2')    pages=[buildTwin(2)];
  if(type==='twin4')    pages=[buildTwin(4)];
  if(type==='bighead0') pages=buildBighead(0);
  if(type==='bighead2') pages=buildBighead(2);
  if(type==='bighead4') pages=buildBighead(4);
  if(type==='rules0')   pages=buildRules(0);
  if(type==='rules2')   pages=buildRules(2);
  if(type==='rules4')   pages=buildRules(4);
  if(type==='gifted0')  pages=buildGiftedGroup(0);
  if(type==='gifted2')  pages=buildGiftedGroup(2);
  if(type==='gifted4')  pages=buildGiftedGroup(4);
  if(type==='special0') pages=buildSpecialGroup(0);
  if(type==='special2') pages=buildSpecialGroup(2);
  if(type==='special4') pages=buildSpecialGroup(4);

  pages.forEach(p=>{
    printArea.appendChild(p.cloneNode(true));
    previewArea.appendChild(p);
  });
  document.getElementById('previewCard').style.display='';
  setTimeout(()=>window.print(),500);
}
</script>
